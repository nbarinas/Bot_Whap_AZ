<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión de Cuotas - AZ Marketing</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #475569;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --border-color: #cbd5e1;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 0.5rem;
        }

        @media(min-width: 768px) {
            .container {
                padding: 1.5rem;
            }
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
        }

        @media(min-width: 768px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
        }

        .header h1 {
            font-weight: 800;
            font-size: 1.6rem;
            margin: 0;
        }

        .btn-primary {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1.1rem;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.3);
            text-align: center;
        }

        @media(min-width: 768px) {
            .btn-primary {
                width: auto;
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.85);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 0.5rem;
            box-sizing: border-box;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 1.5rem 1rem;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 98vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .modal-body {
            overflow-y: auto;
            flex-grow: 1;
            padding: 0.5rem 0;
        }

        .modal-footer {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            margin-top: 1rem;
        }

        .btn-cancel {
            background: white;
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
        }

        @media(min-width: 768px) {
            .modal-content {
                padding: 1.5rem 2rem;
            }

            .modal-footer {
                flex-direction: row;
                justify-content: flex-end;
            }

            .btn-cancel,
            .btn-primary {
                width: auto;
            }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            background: #f8fafc;
            font-size: 1.1rem;
            font-weight: 600;
            box-sizing: border-box;
        }

        .category-toggles {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        @media(min-width: 480px) {
            .category-toggles {
                grid-template-columns: 1fr 1fr 1fr 1fr;
            }
        }

        .category-toggles label {
            background: #f1f5f9;
            padding: 0.8rem;
            border-radius: 10px;
            border: 2px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            font-size: 1rem;
        }

        /* Hierarchical Table Styles */
        .htable-container {
            margin-bottom: 2rem;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 2px solid var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .study-label {
            background: var(--primary-color);
            color: #ffffff;
            padding: 10px 15px;
            font-weight: 800;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .htable-group-header {
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            border-top: 1px solid var(--border-color);
            font-weight: 700;
            padding: 4px;
            text-transform: capitalize;
        }

        /* Custom level colors */
        .level-0-header {
            background: #e0f2fe;
            font-size: 1rem;
            color: var(--text-main);
        }

        .level-1-header {
            background: #f1f5f9;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .level-2-header {
            background: #f8fafc;
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .htable-root-groups {
            display: flex;
            flex-direction: column;
        }

        .htable-cols-container {
            display: flex;
            flex-direction: column;
        }

        .htable-cols-row {
            display: flex;
            width: 100%;
        }

        .htable-cols-row>div {
            flex: 1;
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .htable-cols-row>div:last-child {
            border-right: none;
        }

        .htable-group>.htable-cols-container:last-child>.body-row>div {
            border-bottom: none;
        }

        .header-row>div {
            text-align: center;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 4px;
            background: #ffffff;
            color: var(--text-main);
        }

        .body-row>div {
            padding: 4px 2px;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .htable-input {
            width: 100%;
            height: 32px;
            text-align: center;
            font-weight: 700;
            color: var(--text-main);
            border: 1px solid transparent;
            font-size: 1rem;
            box-sizing: border-box;
            background: transparent;
        }

        .htable-input:focus {
            border: 1px solid var(--primary-color);
            outline: none;
            background: #f8fafc;
            border-radius: 4px;
        }

        .val-container {
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 4px;
        }

        .val-disp {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .val-target {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            width: 90%;
            max-width: 60px;
            height: 5px;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 2px;
        }

        .progress-bar-fill {
            height: 100%;
            transition: width 0.3s;
        }

        /* Desktop Compression & Root Layout Split */
        @media(min-width: 768px) {
            .htable-root-groups {
                flex-direction: row;
                /* Side-by-side columns on PC */
            }

            .htable-root-groups>.htable-group {
                flex: 1;
                border-right: 1px solid var(--text-main);
                /* Thick border between major columns */
            }

            .htable-root-groups>.htable-group:last-child {
                border-right: none;
            }

            .htable-group-header {
                padding: 2px;
                font-size: 0.85rem;
            }

            .level-0-header {
                font-size: 0.95rem;
            }

            .header-row>div {
                padding: 2px;
                font-size: 0.8rem;
            }

            .body-row>div {
                padding: 2px;
            }

            .val-disp {
                font-size: 1.05rem;
            }

            .htable-input {
                height: 28px;
                font-size: 0.9rem;
                padding: 1px;
            }

            .progress-bar-bg {
                margin-top: 2px;
                height: 4px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1 style="color:var(--text-main);"><i class="fas fa-table" style="color:var(--primary-color)"></i> Gestión
                de Cuotas</h1>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" onclick="openModal()">+ Configurar Estudio</button>
                <button onclick="logout()"
                    style="background:var(--danger); color:white; border:none; padding:1rem; border-radius:12px; cursor:pointer; font-weight:700;"><i
                        class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>

        <div id="studiesContainer">
            <p style="text-align: center; font-weight:600; color: var(--text-muted); margin-top:3rem;">Cargando
                cuotas...</p>
        </div>

        <!-- Bot Sandbox UI -->
        <div
            style="margin-top:2rem; margin-bottom: 2rem; background:#fff; border-radius:10px; border:2px solid #22c55e; padding:1.5rem; box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);">
            <h2 style="margin:0 0 1rem 0; color:#166534;"><i class="fab fa-whatsapp"></i> Simulador WhatsApp</h2>
            <p style="color:var(--text-muted); font-size:0.95rem; margin-bottom:1rem;">Prueba enviar comandos al bot. El
                sistema guardará el historial con este número.</p>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <input type="text" id="simPhone" placeholder="Tu Teléfono (Ej: 3001234)"
                    style="padding:0.8rem; border-radius:8px; border:1px solid var(--border-color); flex:1; min-width:150px; font-weight:600;">
                <input type="text" id="simMsg" placeholder="Ej: Hola, 1, 2... (Bot interactivo)"
                    style="padding:0.8rem; border-radius:8px; border:1px solid var(--border-color); flex:3; min-width:250px; font-weight:600;">
                <button onclick="simulateWebhook()"
                    style="background:#22c55e; color:white; border:none; padding:0.8rem 1.5rem; border-radius:8px; font-weight:bold; cursor:pointer;"><i
                        class="fas fa-paper-plane"></i> Enviar a Bot</button>
            </div>
            <pre id="simResponse"
                style="margin-top:1rem; background:#f8fafc; padding:1rem; border-radius:8px; border:1px solid var(--border-color); font-weight:600; white-space:pre-wrap; display:none;"></pre>
        </div>
    </div>

    <!-- Modal -->
    <div id="quotaModal" class="modal">
        <div class="modal-content">
            <h2 style="margin:0 0 1rem 0; font-size:1.5rem; font-weight:800; text-align:center;">Configuración de Cuotas
            </h2>

            <div class="modal-body">
                <div style="display:flex; gap: 10px; margin-bottom: 1rem;">
                    <div class="form-group" style="flex:1; margin:0;">
                        <label>Estudio ID</label>
                        <input type="text" id="studyCode" placeholder="Ej: 1542" required>
                    </div>
                    <div class="form-group" style="flex:1; margin:0;">
                        <label>Cant. Encuestas</label>
                        <input type="number" id="totalSurveys" placeholder="Ej: 100" min="1"
                            oninput="generateProposals()" required>
                    </div>
                </div>

                <div class="form-group">
                    <label style="text-align:center; margin-bottom:10px;">Elige agrupaciones (Prioridad Izq a
                        Der)</label>
                    <div class="category-toggles" id="categoryToggles">
                        <label><input type="checkbox" value="Género" onchange="generateProposals()"> Género</label>
                        <label><input type="checkbox" value="Región" onchange="generateProposals()"> Región</label>
                        <label><input type="checkbox" id="chkEdad" value="Edad" onchange="toggleAgeInputs()">
                            Edad</label>
                        <label><input type="checkbox" value="NSE" onchange="generateProposals()"> NSE</label>
                    </div>
                </div>

                <!-- Custom Age inputs -->
                <div id="dynamicAgeContainer"
                    style="display:none; margin-bottom:1rem; padding:1rem; background:#f8fafc; border:1px solid var(--border-color); border-radius:10px;">
                    <label style="font-weight:700; margin-bottom:0.8rem; display:block; color:var(--primary-color);"><i
                            class="fas fa-edit"></i> Edades Personalizadas (Borra el texto para omitir)</label>
                    <div id="ageInputsList" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px;">
                        <input type="text" class="age-input-field" value="18-30"
                            style="width:100px; padding:6px; border:1px solid #ccc; border-radius:5px; text-align:center; font-weight:600;"
                            oninput="generateProposals()">
                        <input type="text" class="age-input-field" value="31-45"
                            style="width:100px; padding:6px; border:1px solid #ccc; border-radius:5px; text-align:center; font-weight:600;"
                            oninput="generateProposals()">
                    </div>
                    <button type="button" onclick="addAgeRange()"
                        style="background:white; border:2px dashed var(--primary-color); color:var(--primary-color); padding:6px 12px; border-radius:8px; cursor:pointer; font-weight:700; font-size:0.95rem; width:100%;"><i
                            class="fas fa-plus"></i> Añadir Otro Rango</button>
                </div>

                <div id="proposalsContainer"></div>
            </div>

            <div class="modal-footer">
                <button onclick="closeModal()" class="btn-cancel">Cerrar</button>
                <button onclick="saveBatchQuotas()" class="btn-primary">Guardar Cuotas</button>
            </div>
        </div>
    </div>

    <script src="/static/quotas.js?v=11"></script>
</body>

</html>
